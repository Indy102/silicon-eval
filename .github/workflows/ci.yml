# Lint, typecheck, and unit tests on every push.
#
# GitHub-hosted runners are not Apple Silicon, so the MLX-backed integration
# tests (marked `slow`) do NOT run here — run them locally with:
#   pytest -m slow --no-cov
# Unit tests mock the runtime layer and pass anywhere.
name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Check formatting
        run: ruff format --check .
      - name: Typecheck
        run: mypy
      - name: Unit tests
        run: pytest

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build twine
          python -m build
      - name: Validate distribution metadata
        run: twine check --strict dist/*
